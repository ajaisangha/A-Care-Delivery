<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Get an Estimate – A+ Care Deliveries</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header>
    <h1>A+ Care Deliveries</h1>
    <p>Get a Quick Estimate</p>

    <a href="index.html" class="home-link"> Home</a>
    <a href="services.html" class="service-link"> Services</a>
  </header>

  <main>
    <div class="form-container">
      <h2>Estimate Calculator</h2>

      <form id="estimateForm">
        <div class="form-group">
          <label for="service">Service Type</label>
          <select id="service" required>
            <option value="">Select a service</option>
            <option value="florist">Florist Delivery</option>
            <option value="pharmacy">Pharmacy Delivery</option>
            <option value="retail">Retail/Parcel Delivery</option>
            <option value="sameDay">Same-Day Delivery</option>
          </select>
        </div>

        <div class="form-group">
          <label for="distance">Distance (km)</label>
          <input type="number" id="distance" min="0" placeholder="e.g. 12" required>
        </div>

        <div class="form-group" id="packageGroup" style="display:none;">
          <label for="packageSize">Package Size</label>
          <select id="packageSize">
            <option value="">Select size</option>
            <option value="small">Small (under 2kg)</option>
            <option value="medium">Medium (2-10kg)</option>
            <option value="large">Large (10-20kg)</option>
            <option value="xl">Extra Large (20kg+)</option>
          </select>
        </div>

        <div class="form-group" id="urgencyGroup" style="display:none;">
          <label for="urgency">Urgency</label>
          <select id="urgency">
            <option value="">Select urgency</option>
            <option value="economy">By End of Day</option>
            <option value="standard">Within 4 Hours</option>
            <option value="express">Within 2 Hours</option>
            <option value="rush">Within 1 Hour</option>
          </select>
        </div>

        <button type="submit">Get Estimate</button>
      </form>

      <div id="estimateResult"></div>
    </div>
  </main>

  <footer>
    <p>&copy; 2025 A+ Care Deliveries. All rights reserved.</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
