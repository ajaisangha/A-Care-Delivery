<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Estimate — A Care Delivery</title>
  <link rel="stylesheet" href="css/estimate.css" />
</head>
<body>
  <header class="header">
    <div class="logo">
      <a href="index.html"><img src="images/logo.png" alt="A Care Delivery Logo" /></a>
    </div>
    <nav class="nav">
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="services.html">Services</a></li>
        <li><a href="estimate.html" class="active">Estimate</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
    </nav>
    <button class="menu-toggle" id="menuToggle">☰</button>
  </header>

  <section class="estimate-section">
    <div class="container">
      <h1>Get an Estimate</h1>
      <p>Enter the details below to get a rough estimate of cost & time.</p>
      <form id="estimateForm">
        <div class="form-group">
          <label for="serviceType">Service Type</label>
          <select id="serviceType" name="serviceType" required>
            <option value="homeNursing">Home Nursing</option>
            <option value="medicineDelivery">Medicine Delivery</option>
            <option value="teleconsultation">Teleconsultation</option>
          </select>
        </div>

        <div class="form-group">
          <label for="distance">Distance (km)</label>
          <input type="number" id="distance" name="distance" min="0" step="0.1" required />
        </div>

        <div class="form-group">
          <button type="submit" class="btn-estimate">Estimate</button>
        </div>
      </form>

      <div id="estimateResult" class="result-area"></div>
    </div>
  </section>

  <footer class="footer">
    <p>&copy; 2025 A Care Delivery. All rights reserved.</p>
    <div class="social-links">
      <a href="#">Facebook</a> |
      <a href="#">Twitter</a> |
      <a href="#">Instagram</a>
    </div>
  </footer>

  <script src="js/estimate.js"></script>
</body>
</html>
