<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Get an Estimate – A+ Care Deliveries</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">
  <style>
    .form-container {
      max-width: 600px;
      margin: 40px auto;
      background: #fff;
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.05);
    }

    .form-container h2 {
      margin-bottom: 20px;
      color: #0d6efd;
      text-align: center;
    }

    .form-group {
      margin-bottom: 15px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-weight: bold;
    }

    select, input, textarea {
      width: 100%;
      padding: 10px;
      font-size: 1rem;
      border: 1px solid #ccc;
      border-radius: 4px;
    }

    .form-group.inline {
      display: flex;
      gap: 10px;
    }

    .form-group.inline > div {
      flex: 1;
    }

    button {
      background-color: #0d6efd;
      color: white;
      padding: 12px 20px;
      border: none;
      border-radius: 5px;
      font-size: 1rem;
      cursor: pointer;
      width: 100%;
      margin-top: 10px;
    }

    #estimateResult {
      margin-top: 20px;
      font-weight: bold;
      background: #e0f7fa;
      padding: 15px;
      border-left: 4px solid #00acc1;
      border-radius: 4px;
    }
  </style>
</head>
<body>

  <header>
    <h1>A+ Care Deliveries</h1>
    <p>Get a Quick Estimate</p>

    <a href="index.html" class="home-link"> Home</a>
    <a href="services.html" class="service-link"> Services</a>
  </header>

  <main>
    <div class="form-container">
      <h2>Estimate Calculator</h2>

      <form id="estimateForm">
        <div class="form-group">
          <label for="service">Service Type</label>
          <select id="service" required>
            <option value="">Select a service</option>
            <option value="florist">Florist Delivery</option>
            <option value="pharmacy">Pharmacy Delivery</option>
            <option value="retail">Retail/Parcel Delivery</option>
            <option value="sameDay">Same-Day Delivery</option>
          </select>
        </div>

        <div class="form-group">
          <label for="distance">Distance (km)</label>
          <input type="number" id="distance" min="0" placeholder="e.g. 12" required>
        </div>

        <div class="form-group" id="packageGroup" style="display:none;">
          <label for="packageSize">Package Size</label>
          <select id="packageSize">
            <option value="">Select size</option>
            <option value="small">Small (under 2kg)</option>
            <option value="medium">Medium (2-10kg)</option>
            <option value="large">Large (10-20kg)</option>
            <option value="xl">Extra Large (20kg+)</option>
          </select>
        </div>

        <div class="form-group" id="urgencyGroup" style="display:none;">
          <label for="urgency">Urgency</label>
          <select id="urgency">
            <option value="">Select urgency</option>
            <option value="economy">By End of Day</option>
            <option value="standard">Within 4 Hours</option>
            <option value="express">Within 2 Hours</option>
            <option value="rush">Within 1 Hour</option>
          </select>
        </div>

        <button type="submit">Get Estimate</button>
      </form>

      <div id="estimateResult"></div>
    </div>
  </main>

  <footer>
    <p>&copy; 2025 A+ Care Deliveries. All rights reserved.</p>
  </footer>

  <script>
    // Dynamic field display based on service type
    const service = document.getElementById('service');
    const packageGroup = document.getElementById('packageGroup');
    const urgencyGroup = document.getElementById('urgencyGroup');

    service.addEventListener('change', function () {
      const value = service.value;
      packageGroup.style.display = value === 'retail' ? 'block' : 'none';
      urgencyGroup.style.display = value === 'sameDay' ? 'block' : 'none';
    });

    // Estimate logic
    document.getElementById('estimateForm').addEventListener('submit', function (e) {
      e.preventDefault();

      const distance = parseFloat(document.getElementById('distance').value);
      const serviceType = service.value;
      const packageSize = document.getElementById('packageSize').value;
      const urgency = document.getElementById('urgency').value;
      let estimate = 0;

      if (isNaN(distance) || distance < 0) {
        alert("Please enter a valid distance.");
        return;
      }

      switch (serviceType) {
        case 'florist':
          if (distance <= 10) estimate = 15;
          else if (distance <= 15) estimate = 22;
          else if (distance <= 20) estimate = 35;
          else estimate = 40; // Holiday/Emergency
          break;

        case 'pharmacy':
          if (distance <= 5) estimate = 8;
          else if (distance <= 10) estimate = 15;
          else estimate = 20;
          break;

        case 'retail':
          switch (packageSize) {
            case 'small':
              if (distance <= 15) estimate = 12;
              else estimate = 18;
              break;
            case 'medium':
              estimate = distance <= 15 ? 16 : 24;
              break;
            case 'large':
              estimate = distance <= 15 ? 22 : 32;
              break;
            case 'xl':
              estimate = 'Custom quote required';
              break;
            default:
              estimate = 0;
          }
          break;

        case 'sameDay':
          switch (urgency) {
            case 'economy': estimate = 12; break;
            case 'standard': estimate = 18; break;
            case 'express': estimate = 28; break;
            case 'rush': estimate = 40; break;
            default: estimate = 0;
          }
          break;

        default:
          estimate = 0;
      }

      const resultDiv = document.getElementById('estimateResult');
      if (typeof estimate === 'number') {
        resultDiv.innerHTML = `💰 Estimated Price: <strong>$${estimate.toFixed(2)}</strong>`;
      } else {
        resultDiv.innerHTML = `💬 ${estimate}`;
      }
    });
  </script>
</body>
</html>
