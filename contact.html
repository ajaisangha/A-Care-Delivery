<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact | A+ Care Delivery</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/contact.css" />
</head>
<body>
  <!-- Header Component -->
  <div id="header-placeholder"></div>

  <main>
    <section class="contact-section">
      <h1>Contact A+ Care Delivery</h1>
      <p>We’d love to hear from you! Get in touch for inquiries, delivery partnerships, or feedback.</p>

      <div class="contact-info">
        <p><strong>Company Name:</strong> A+ Care Delivery</p>
        <p><strong>Email:</strong> <span id="company-email">[coming soon]</span></p>
        <p><strong>Phone:</strong> <span id="company-phone">[coming soon]</span></p>
      </div>

      <form id="contact-form">
        <div class="form-group">
          <label for="name">Your Name</label>
          <input type="text" id="name" required>
        </div>

        <div class="form-group">
          <label for="email">Your Email</label>
          <input type="email" id="email" required>
        </div>

        <div class="form-group">
          <label for="message">Message</label>
          <textarea id="message" rows="5" required></textarea>
        </div>

        <button type="submit" class="btn">Send Message</button>
      </form>
    </section>
  </main>

  <!-- Footer Component -->
  <div id="footer-placeholder"></div>

  <script src="js/script.js"></script>
  <script src="js/contact.js"></script>
</body>
</html>
